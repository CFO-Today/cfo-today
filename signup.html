<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이메일로 가입하기 — 오늘경리</title>
<meta name="description" content="오늘경리 계정을 만들어요. 1분이면 끝나요.">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/pages.css">
</head>
<body class="page">
<a class="skip-link" href="#main">본문 바로가기</a>

<header class="site-header site-header--minimal">
  <div class="container site-header__inner">
    <a class="logo" href="index.html">오늘<span>경리</span></a>
    <nav class="site-nav">
      <a href="login.html">가입 안내</a>
    </nav>
  </div>
</header>

<main id="main" class="auth">
  <div class="auth__card">

    <a class="btn btn--ghost" href="login.html" style="margin-bottom:18px">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"></path></svg>
      뒤로
    </a>

    <div class="t-center" style="margin-bottom:22px">
      <span class="icon-tile icon-tile--lg" style="margin:0 auto 16px">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      </span>
      <h1 class="t-section">이메일로 가입하기</h1>
      <p class="t-sub" style="margin-top:7px">오늘경리 계정을 만들어요. 1분이면 끝나요.</p>
    </div>

    <form id="signup-form" novalidate>

      <p style="margin-bottom:13px">
        <span class="chip chip--accent chip--sm chip--dot">필수 입력</span>
      </p>

      <div class="field">
        <label class="label" for="email">이메일</label>
        <input class="input" type="email" id="email" name="email"
               placeholder="name@company.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label class="label" for="password">비밀번호</label>
        <input class="input" type="password" id="password" name="password"
               placeholder="영문·숫자 포함 8자 이상" autocomplete="new-password"
               minlength="8" required>
      </div>

      <p class="divider" style="margin:22px 0 16px">선택 정보 — 나중에 입력해도 돼요</p>

      <div class="field" style="margin-bottom:10px">
        <label class="label label--optional" for="name">이름</label>
        <input class="input input--optional" type="text" id="name" name="name"
               placeholder="홍길동 또는 홍대표" autocomplete="name">
      </div>

      <div class="field" style="margin-bottom:10px">
        <label class="label label--optional" for="company">회사명</label>
        <input class="input input--optional" type="text" id="company" name="company"
               placeholder="(주)오늘컴퍼니" autocomplete="organization">
      </div>

      <div class="field" style="margin-bottom:6px">
        <label class="label label--optional" for="role">직책</label>
        <input class="input input--optional" type="text" id="role" name="role"
               placeholder="대표·이사 등" autocomplete="organization-title">
      </div>

      <p class="auth__optional-note">이름을 적으시면 마이페이지에서 이름으로 불러드려요.</p>

      <button class="btn btn--primary btn--lg btn--block" type="submit">가입하기</button>

      <p class="divider" style="margin:18px 0 16px">또는</p>

      <button class="btn btn--kakao btn--block" type="button" style="padding:14px;border-radius:14px;font-size:15px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.9 3 3 6.3 3 10.2c0 2.5 1.7 4.7 4.2 6-.2.6-.7 2.4-.8 2.8 0 .2.1.4.4.2.2-.1 2.6-1.7 3.2-2.1.6.1 1.3.1 2 .1 5.1 0 9-3.3 9-7.2S17.1 3 12 3z"></path></svg>
        카카오로 간편 가입
      </button>

      <label class="check" style="margin-top:20px">
        <input type="checkbox" name="agree" required checked>
        <span class="check__box">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
        </span>
        <span><b style="color:#5C544C">(필수)</b> 개인정보 수집·이용에 동의합니다.
          <a href="terms.html">이용약관</a>·<a href="privacy.html">개인정보 처리방침</a>
        </span>
      </label>

    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="container site-footer__inner">
    <div class="site-footer__top">
      <div>
        <p class="site-footer__biz-name">주식회사 오늘워크</p>
        <p class="site-footer__biz-info">
          대표 이재준&nbsp;&nbsp;|&nbsp;&nbsp;사업자등록번호 612-87-03999<br>
          서울특별시 강남구 학동로12길 18, 비01호(논현동)
        </p>
      </div>
      <nav class="site-footer__links" aria-label="정책 및 문의">
        <a href="terms.html">이용약관</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="mailto:albatoday26@gmail.com">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"></rect><path d="M3 7l9 6 9-6"></path></svg>
          고객문의
        </a>
      </nav>
    </div>
    <p class="site-footer__copy">© <span data-year>2025</span> 오늘워크. All rights reserved.</p>
  </div>
</footer>

<script src="assets/js/app.js"></script>
<script>
  // 데모용 — 실제 인증 연동 전까지는 업로드 화면으로 보냅니다.
  document.getElementById("signup-form").addEventListener("submit", function (e) {
    e.preventDefault();
    if (!this.checkValidity()) { this.reportValidity(); return; }
    location.href = "upload.html";
  });
</script>
</body>
</html>
